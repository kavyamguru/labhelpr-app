services:
  db:
    image: postgres:16
    container_name: labhelpr-db
    environment:
      POSTGRES_USER: labhelpr
      POSTGRES_PASSWORD: labhelpr
      POSTGRES_DB: labhelpr
    ports:
      - "5432:5432"
    volumes:
      - labhelpr_db_data:/var/lib/postgresql/data

volumes:
  labhelpr_db_data:

